services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: tg_spam
      POSTGRES_USER: tg_spam
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?請設定 POSTGRES_PASSWORD}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tg_spam -d tg_spam"]
      interval: 5s
      timeout: 3s
      retries: 10
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:${POSTGRES_PORT:-55432}:5432"
    networks: [backend]

  redis:
    image: redis:8-alpine
    command: ["redis-server", "--appendonly", "yes"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    volumes:
      - redis_data:/data
    networks: [backend]

  app:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      APP_MODE: ${APP_MODE:-observe}
      HTTP_ADDR: :8080
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:?請設定 TELEGRAM_BOT_TOKEN}
      TELEGRAM_WEBHOOK_SECRET: ${TELEGRAM_WEBHOOK_SECRET:?請設定 TELEGRAM_WEBHOOK_SECRET}
      DATABASE_URL: postgres://tg_spam:${POSTGRES_PASSWORD:?請設定 POSTGRES_PASSWORD}@postgres:5432/tg_spam?sslmode=disable
      REDIS_ADDR: redis:6379
      CONTENT_HASH_KEY: ${CONTENT_HASH_KEY:?請設定 CONTENT_HASH_KEY}
      RULES_DIR: /app/configs/rules
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "8080:8080"
    volumes:
      - ./configs/rules:/app/configs/rules:ro
    restart: unless-stopped
    stop_grace_period: 20s
    networks: [backend]

networks:
  backend:
    internal: false

volumes:
  postgres_data:
  redis_data:

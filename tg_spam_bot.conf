# TLS 由前端 ALB 終止；此檔案只在內部 HTTP listener 接收 ALB 流量。
upstream tg_spam_bot_backend {
    server 127.0.0.1:9222;
    keepalive 16;
}

server {
    listen 80;
    listen [::]:80;
    server_name ;

    client_max_body_size 1m;

    location = /telegram/webhook {
        # Webhook 只接受 POST，提前拒絕不必要的方法可縮小公開介面。
        limit_except POST {
            deny all;
        }

        proxy_pass http://tg_spam_bot_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        # ALB 已終止 TLS，必須保留其提供的原始協定而不是 Nginx 所見的 HTTP。
        proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;
        proxy_set_header Connection "";
        proxy_connect_timeout 5s;
        proxy_send_timeout 10s;
        proxy_read_timeout 30s;
    }

    location = /health/live {
        # ALB Target Group 需要從 VPC 位址存取；來源限制由 Security Group 負責。
        proxy_pass http://tg_spam_bot_backend;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
    }

    location = /health/ready {
        # readiness 同時檢查 PostgreSQL 與 Redis，適合作為 ALB health check path。
        proxy_pass http://tg_spam_bot_backend;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
    }

    location / {
        return 404;
    }
}

services:
  postgres:
    image: vincent119/postgres:18-20260716001
    environment:
      POSTGRES_DB: tg_spam
      POSTGRES_USER: tg_spam
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?請設定 POSTGRES_PASSWORD}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tg_spam -d tg_spam"]
      interval: 5s
      timeout: 3s
      retries: 10
    volumes:
      - ./postgres_data:/var/lib/postgresql
    ports:
      - "127.0.0.1:${POSTGRES_PORT:-55432}:5432"
    networks: [backend]

  redis:
    image: redis:8-alpine
    command: ["redis-server", "--appendonly", "yes"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    volumes:
      - ./redis_data:/data
    networks: [backend]

  app:
    image: vincent119/tg_spam_bot:latest
    environment:
      CONFIG_FILE: /app/configs/config.yaml
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:?請設定 TELEGRAM_BOT_TOKEN}
      TELEGRAM_WEBHOOK_SECRET: ${TELEGRAM_WEBHOOK_SECRET:?請設定 TELEGRAM_WEBHOOK_SECRET}
      DB_HOST: postgres
      DB_USER: tg_spam
      DB_PASSWORD: ${POSTGRES_PASSWORD:?請設定 POSTGRES_PASSWORD}
      REDIS_ADDR: redis:6379
      CONTENT_HASH_KEY: ${CONTENT_HASH_KEY:?請設定 CONTENT_HASH_KEY}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "9222:9222"
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "/dev/null", "http://127.0.0.1:9222/health/ready"]
      interval: 10s
      timeout: 3s
      retries: 3
    volumes:
      - ./configs:/app/configs:ro
      - ./logs:/app/logs
    restart: unless-stopped
    stop_grace_period: 40s
    networks: [backend]

networks:
  backend:
    internal: false

volumes:
  postgres_data:
  redis_data:

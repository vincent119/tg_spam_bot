services:
  postgres:
    image: vincent119/postgres:18-20260716001
    environment:
      POSTGRES_DB: tg_spam
      POSTGRES_USER: tg_spam
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?請設定 POSTGRES_PASSWORD}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tg_spam -d tg_spam"]
      interval: 5s
      timeout: 3s
      retries: 10
    volumes:
      - ./postgres_data:/var/lib/postgresql
    ports:
      - "127.0.0.1:${POSTGRES_PORT:-55432}:5432"
    networks: [backend]

  redis:
    image: redis:8-alpine
    command: ["redis-server", "--appendonly", "yes"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    volumes:
      - ./redis_data:/data
    networks: [backend]

  app:
    image: vincent119/tg_spam_bot:latest
    environment:
      CONFIG_FILE: /app/configs/config.yaml
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:?請設定 TELEGRAM_BOT_TOKEN}
      TELEGRAM_WEBHOOK_SECRET: ${TELEGRAM_WEBHOOK_SECRET:?請設定 TELEGRAM_WEBHOOK_SECRET}
      TELEGRAM_WEBHOOK_URL: ${TELEGRAM_WEBHOOK_URL:-}
      DB_HOST: postgres
      DB_USER: tg_spam
      DB_PASSWORD: ${POSTGRES_PASSWORD:?請設定 POSTGRES_PASSWORD}
      REDIS_ADDR: redis:6379
      CONTENT_HASH_KEY: ${CONTENT_HASH_KEY:?請設定 CONTENT_HASH_KEY}
      AI_DETECTION_ENABLED: ${AI_DETECTION_ENABLED:-false}
      AI_DETECTION_MODE: ${AI_DETECTION_MODE:-observe}
      AI_DETECTION_PROVIDER: ${AI_DETECTION_PROVIDER:-}
      AI_DETECTION_OPENAI_COMPATIBLE_ENDPOINT: ${AI_DETECTION_OPENAI_COMPATIBLE_ENDPOINT:-}
      AI_DETECTION_OPENAI_COMPATIBLE_MODEL: ${AI_DETECTION_OPENAI_COMPATIBLE_MODEL:-}
      AI_DETECTION_OPENAI_COMPATIBLE_API_KEY: ${AI_DETECTION_OPENAI_COMPATIBLE_API_KEY:-}
      AI_DETECTION_BEDROCK_REGION: ${AI_DETECTION_BEDROCK_REGION:-}
      AI_DETECTION_BEDROCK_MODEL_ID: ${AI_DETECTION_BEDROCK_MODEL_ID:-}
      AI_DETECTION_BEDROCK_AUTH_MODE: ${AI_DETECTION_BEDROCK_AUTH_MODE:-iam_role}
      AI_DETECTION_BEDROCK_ACCESS_KEY_ID: ${AI_DETECTION_BEDROCK_ACCESS_KEY_ID:-}
      AI_DETECTION_BEDROCK_SECRET_ACCESS_KEY: ${AI_DETECTION_BEDROCK_SECRET_ACCESS_KEY:-}
      AI_DETECTION_BEDROCK_SESSION_TOKEN: ${AI_DETECTION_BEDROCK_SESSION_TOKEN:-}
      SEMANTIC_MEMORY_ENABLED: ${SEMANTIC_MEMORY_ENABLED:-false}
      SEMANTIC_MEMORY_EMBEDDING_PROVIDER: ${SEMANTIC_MEMORY_EMBEDDING_PROVIDER:-}
      SEMANTIC_MEMORY_EMBEDDING_VERSION: ${SEMANTIC_MEMORY_EMBEDDING_VERSION:-v1}
      SEMANTIC_MEMORY_EMBEDDING_DIMENSIONS: ${SEMANTIC_MEMORY_EMBEDDING_DIMENSIONS:-0}
      SEMANTIC_MEMORY_SIMILARITY_THRESHOLD: ${SEMANTIC_MEMORY_SIMILARITY_THRESHOLD:-0.88}
      SEMANTIC_MEMORY_SPAM_SIMILARITY_THRESHOLD: ${SEMANTIC_MEMORY_SPAM_SIMILARITY_THRESHOLD:-0.90}
      SEMANTIC_MEMORY_HAM_SIMILARITY_THRESHOLD: ${SEMANTIC_MEMORY_HAM_SIMILARITY_THRESHOLD:-0.95}
      SEMANTIC_MEMORY_MAX_NEIGHBORS: ${SEMANTIC_MEMORY_MAX_NEIGHBORS:-5}
      SEMANTIC_MEMORY_CACHE_TTL: ${SEMANTIC_MEMORY_CACHE_TTL:-168h}
      SEMANTIC_MEMORY_OPENAI_COMPATIBLE_ENDPOINT: ${SEMANTIC_MEMORY_OPENAI_COMPATIBLE_ENDPOINT:-}
      SEMANTIC_MEMORY_OPENAI_COMPATIBLE_MODEL: ${SEMANTIC_MEMORY_OPENAI_COMPATIBLE_MODEL:-}
      SEMANTIC_MEMORY_OPENAI_COMPATIBLE_API_KEY: ${SEMANTIC_MEMORY_OPENAI_COMPATIBLE_API_KEY:-}
      SEMANTIC_MEMORY_BEDROCK_REGION: ${SEMANTIC_MEMORY_BEDROCK_REGION:-}
      SEMANTIC_MEMORY_BEDROCK_MODEL_ID: ${SEMANTIC_MEMORY_BEDROCK_MODEL_ID:-}
      SEMANTIC_MEMORY_BEDROCK_AUTH_MODE: ${SEMANTIC_MEMORY_BEDROCK_AUTH_MODE:-iam_role}
      SEMANTIC_MEMORY_BEDROCK_ACCESS_KEY_ID: ${SEMANTIC_MEMORY_BEDROCK_ACCESS_KEY_ID:-}
      SEMANTIC_MEMORY_BEDROCK_SECRET_ACCESS_KEY: ${SEMANTIC_MEMORY_BEDROCK_SECRET_ACCESS_KEY:-}
      SEMANTIC_MEMORY_BEDROCK_SESSION_TOKEN: ${SEMANTIC_MEMORY_BEDROCK_SESSION_TOKEN:-}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "9222:9222"
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "/dev/null", "http://127.0.0.1:9222/health/ready"]
      interval: 10s
      timeout: 3s
      retries: 3
    volumes:
      - ./configs:/app/configs:ro
      - ./logs:/app/logs
    restart: unless-stopped
    stop_grace_period: 40s
    networks: [backend]

networks:
  backend:
    internal: false

volumes:
  postgres_data:
  redis_data:

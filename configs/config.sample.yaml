# 應用程式、HTTP Server 與處置模式設定。
app:
  # HTTP 監聽連接埠；HTTP_ADDR 存在時由環境變數完整覆寫位址。
  port: 8080
  # 部署環境識別，用於日誌與後續可觀測性欄位。
  env: dev
  # observe、delete-only 或 enforce。
  mode: observe
  # 僅供業務顯示，資料庫時間仍以 UTC 儲存。
  business_timezone: Asia/Taipei
  read_timeout: 10s
  write_timeout: 30s
  shutdown_timeout: 30s
  # 限制 Telegram Webhook body，避免超大請求耗盡記憶體。
  max_body_bytes: 1048576

# zlogger 結構化日誌設定；format 是編碼格式，不是輸出目的地。
log:
  level: info
  # json 或 console；正式環境建議 json。
  format: json
  # console、file 可同時啟用；file output 寫入 path/file。
  outputs:
    - console
  path: ./logs
  file: app.log
  # Deprecated：未啟用 rotate 時，啟動時只保留 path 中最新的 .log 檔案數量；0 表示不清理。
  max_files: 14
  # 檔案日誌輪轉只在 outputs 包含 file 且 enabled=true 時生效。
  rotate:
    enabled: false
    # 0 表示使用預設 100 MB。
    max_size_mb: 100
    # 0 表示不限制備份數。
    max_backups: 14
    # 0 表示不依天數刪除。
    max_age_days: 30
    compress: true

# PostgreSQL 與 GORM 連線池設定。
db:
  name: tg_spam
  # 主要節點負責目前所有讀寫操作。
  primary:
    host: localhost
    port: 5432
    user: "" # ENV: DB_USER
    password: "" # ENV: DB_PASSWORD
  # 預留唯讀節點；目前版本尚未進行讀寫分離。
  replicas: []
  max_open_conns: 25
  max_idle_conns: 5
  conn_max_lifetime: 5m
  # enabled=false 時固定使用 sslmode=disable。
  tls:
    enabled: false
    mode: verify-full
    ca_cert: ""
    client_cert: ""
    client_key: ""

# Telegram 秘密值只能由環境變數或 Secret Manager 注入。
telegram:
  bot_token: "" # ENV: TELEGRAM_BOT_TOKEN
  webhook_secret: "" # ENV: TELEGRAM_WEBHOOK_SECRET
  # 可選；設定後啟動與定期健康檢查會比對 Telegram 實際 Webhook URL。
  webhook_url: "" # ENV: TELEGRAM_WEBHOOK_URL
  # 僅處理清單內的 group 或 supergroup；可用逗號分隔的 TELEGRAM_ALLOWED_CHAT_IDS 覆寫。
  allowed_chat_ids:
    - -1001234567890

# Redis 保存短時間頻率、重複內容與跨帳號協同訊號。
redis:
  addr: "redis:6379"
  username: "" # ENV: REDIS_USERNAME
  password: "" # ENV: REDIS_PASSWORD
  requirepass: "" # ENV: REDIS_REQUIREPASS
  db: 0

# 安全設定不得提交真實秘密值。
security:
  content_hash_key: "" # ENV: CONTENT_HASH_KEY

# 啟動時載入並編譯規則，訊息熱路徑不查詢資料庫。
rules:
  dir: configs/rules

# 固定問答自動回覆；規則內容放在獨立 YAML，避免主設定混入大量業務文案。
auto_replies:
  enabled: false
  rules_file: configs/auto_replies.yaml

# AI 輔助判定預設停用；首版建議只用 observe 校準，不直接封鎖。
ai_detection:
  enabled: false
  mode: observe
  provider: openai_compatible
  timeout: 3s
  max_text_chars: 800
  min_confidence: 0.85
  only_when_ambiguous: true
  cache_ttl: 24h
  # OpenAI-compatible provider 使用 API key；實值只可由 ENV 或 Secret Manager 注入。
  openai_compatible:
    endpoint: "" # ENV: AI_DETECTION_OPENAI_COMPATIBLE_ENDPOINT
    model: "" # ENV: AI_DETECTION_OPENAI_COMPATIBLE_MODEL
    api_key: "" # ENV: AI_DETECTION_OPENAI_COMPATIBLE_API_KEY
  # AWS Bedrock 正式環境優先使用 iam_role；static_keys 僅作為相容選項。
  bedrock:
    region: "" # ENV: AI_DETECTION_BEDROCK_REGION
    model_id: "" # ENV: AI_DETECTION_BEDROCK_MODEL_ID
    auth_mode: iam_role # iam_role 或 static_keys；ENV: AI_DETECTION_BEDROCK_AUTH_MODE
    access_key_id: "" # ENV: AI_DETECTION_BEDROCK_ACCESS_KEY_ID
    secret_access_key: "" # ENV: AI_DETECTION_BEDROCK_SECRET_ACCESS_KEY
    session_token: "" # ENV: AI_DETECTION_BEDROCK_SESSION_TOKEN

# pgvector 語意記憶預設停用；不同 provider/model/version/dimensions 的向量不得混查。
semantic_memory:
  enabled: false
  embedding_provider: openai_compatible
  embedding_version: v1
  # 0 表示由 adapter 首次結果決定；正式環境建議固定維度。
  embedding_dimensions: 0
  similarity_threshold: 0.88
  spam_similarity_threshold: 0.90
  ham_similarity_threshold: 0.95
  max_neighbors: 5
  cache_ttl: 168h
  openai_compatible:
    endpoint: "" # ENV: SEMANTIC_MEMORY_OPENAI_COMPATIBLE_ENDPOINT
    model: "" # ENV: SEMANTIC_MEMORY_OPENAI_COMPATIBLE_MODEL
    api_key: "" # ENV: SEMANTIC_MEMORY_OPENAI_COMPATIBLE_API_KEY
  bedrock:
    region: "" # ENV: SEMANTIC_MEMORY_BEDROCK_REGION
    model_id: "" # ENV: SEMANTIC_MEMORY_BEDROCK_MODEL_ID
    auth_mode: iam_role # iam_role 或 static_keys；ENV: SEMANTIC_MEMORY_BEDROCK_AUTH_MODE
    access_key_id: "" # ENV: SEMANTIC_MEMORY_BEDROCK_ACCESS_KEY_ID
    secret_access_key: "" # ENV: SEMANTIC_MEMORY_BEDROCK_SECRET_ACCESS_KEY
    session_token: "" # ENV: SEMANTIC_MEMORY_BEDROCK_SESSION_TOKEN
